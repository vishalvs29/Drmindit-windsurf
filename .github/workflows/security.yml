name: Security Audit

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

env:
  JAVA_VERSION: '17'

jobs:
  # Security Audit
  security-audit:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Set up JDK ${{ env.JAVA_VERSION }}
      uses: actions/setup-java@v4
      with:
        java-version: ${{ env.JAVA_VERSION }}
        distribution: 'temurin'

    - name: Cache Gradle packages
      uses: actions/cache@v3
      with:
        path: |
          ~/.gradle/caches
          ~/.gradle/wrapper
        key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
        restore-keys: |
          ${{ runner.os }}-gradle-

    - name: Grant execute permission for gradlew
      run: chmod +x gradlew

    - name: Install security tools
      run: |
        # Install dependency-check
        wget -O dependency-check.tar.gz https://github.com/jeremylong/DependencyCheck/releases/download/v9.2.0/dependency-check-9.2.0-release.tar.gz
        tar -xvf dependency-check.tar.gz
        sudo mv dependency-check /opt/
        sudo ln -s /opt/dependency-check/bin/dependency-check /usr/local/bin/

    - name: Run Security Audit Script
      run: ./scripts/security-audit.sh

    - name: Run OWASP Dependency Check
      run: |
        dependency-check --project . \
          --format XML \
          --format HTML \
          --format JSON \
          --failBuildOnCVSS 7 \
          --suppressionFiles dependency-check-suppressions.xml

    - name: Upload Dependency Check Reports
      uses: actions/upload-artifact@v3
      if: always()
      with:
        name: dependency-check-reports
        path: |
          dependency-check-report.html
          dependency-check-report.xml
          dependency-check-report.json

    - name: Run Trivy vulnerability scanner
      uses: aquasecurity/trivy-action@master
      with:
        scan-type: 'fs'
        scan-ref: '.'
        format: 'sarif'
        output: 'trivy-results.sarif'

    - name: Upload Trivy scan results to GitHub Security tab
      uses: github/codeql-action/upload-sarif@v2
      if: always()
      with:
        sarif_file: 'trivy-results.sarif'

    - name: Run Secret Scanning
      run: |
        # Check for secrets in git history
        git log --all --full-history --source=ALL --raw | grep -E "password|secret|key|token" || echo "No secrets found in git history"
        
        # Check for exposed API keys in code
        grep -r -E "AIza[0-9A-Za-z_-]{35}|ya29\.[0-9A-Za-z_-]{100}|AKIA[0-9A-Z]{16}" --include="*.kt" --include="*.java" --include="*.xml" --include="*.json" --exclude-dir=build . || echo "No API keys found"

    - name: Check for sensitive files
      run: |
        # Ensure sensitive files are not committed
        if [ -f ".env" ] || [ -f "google-services.json" ] || [ -f "local.properties" ]; then
          echo "ERROR: Sensitive files found in repository"
          exit 1
        fi
        
        # Check if .env.example exists
        if [ ! -f ".env.example" ]; then
          echo "WARNING: .env.example file is missing"
        fi

    - name: Verify .gitignore security entries
      run: |
        required_entries=(".env" "google-services.json" "*.keystore" "*.jks" "local.properties")
        missing_entries=()
        
        for entry in "${required_entries[@]}"; do
          if ! grep -q "^$entry" .gitignore; then
            missing_entries+=("$entry")
          fi
        done
        
        if [ ${#missing_entries[@]} -gt 0 ]; then
          echo "ERROR: Missing .gitignore entries: ${missing_entries[*]}"
          exit 1
        fi

    - name: Check for hardcoded secrets in build files
      run: |
        # Check build.gradle files for hardcoded secrets
        grep -r -E "(password|secret|key|token).*=.*[\"'][^\"']+[\"']" --include="*.gradle*" --exclude-dir=build . || echo "No hardcoded secrets in build files"

    - name: Run Static Analysis (Detekt)
      run: ./gradlew detekt

    - name: Upload Detekt reports
      uses: actions/upload-artifact@v3
      if: always()
      with:
        name: detekt-security-reports
        path: androidApp/build/reports/detekt/

    - name: Security Summary
      run: |
        echo "🔐 Security Audit Summary"
        echo "========================"
        echo "✅ Repository scanned for exposed secrets"
        echo "✅ Dependencies checked for vulnerabilities"
        echo "✅ Container images scanned with Trivy"
        echo "✅ Static analysis completed with Detekt"
        echo "✅ Sensitive files verification passed"
        echo "✅ .gitignore security entries validated"
        echo ""
        echo "📋 Security Checklist:"
        echo "✅ No exposed secrets in current files"
        echo "✅ Environment variables properly configured"
        echo "✅ Sensitive files excluded from version control"
        echo "✅ Dependencies vulnerability scan completed"
        echo "✅ Container security scan completed"
        echo "✅ Code quality analysis completed"

  # Container Security (if Docker is used)
  container-security:
    runs-on: ubuntu-latest
    if: contains(github.event.head_commit.modified, 'Dockerfile') || contains(github.event.head_commit.modified, 'docker-compose')
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Build Docker image
      run: |
        if [ -f "Dockerfile" ]; then
          docker build -t drmindit-security-scan .
        fi

    - name: Run Trivy on Docker image
      uses: aquasecurity/trivy-action@master
      with:
        image-ref: 'drmindit-security-scan'
        format: 'sarif'
        output: 'docker-trivy-results.sarif'

    - name: Upload Docker Trivy results
      uses: github/codeql-action/upload-sarif@v2
      if: always()
      with:
        sarif_file: 'docker-trivy-results.sarif'

  # Periodic Security Scan
  periodic-security-scan:
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule'
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Run comprehensive security scan
      run: |
        echo "🕒 Running periodic security scan..."
        ./scripts/security-audit.sh
        
        # Check for new vulnerabilities in dependencies
        dependency-check --project . --format JSON --failBuildOnCVSS 7 || true
        
        # Generate security report
        echo "📊 Security Report Generated at $(date)"

  # Notify on security issues
  security-notification:
    runs-on: ubuntu-latest
    needs: [security-audit]
    if: failure()
    steps:
    - name: Notify security team
      uses: 8398a7/action-slack@v3
      with:
        status: failure
        channel: '#security-alerts'
        text: '🚨 Security audit failed! Please review the scan results immediately.'
      env:
        SLACK_WEBHOOK_URL: ${{ secrets.SECURITY_SLACK_WEBHOOK_URL }}
